<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Plot Armor — Spoiler-Safe Reddit</title>
  <link rel="stylesheet" href="style.css" />
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>
  <header>
    <div class="header-inner">
      <div class="logo">
        <span class="logo-shield">🛡️</span>
        <span class="logo-text">Plot Armor</span>
      </div>
      <p class="tagline">Read Reddit episode threads without spoilers</p>
    </div>
  </header>

  <main>
    <!-- Input Card -->
    <section class="card input-card">
      <h2>Load a Thread</h2>

      <div class="field">
        <label for="thread-url">Reddit Thread URL</label>
        <input
          type="url"
          id="thread-url"
          placeholder="https://www.reddit.com/r/…/comments/…"
          autocomplete="off"
        />
      </div>

      <div class="divider"><span>Filter by</span></div>

      <!-- Filter mode tabs -->
      <div class="tab-row">
        <button class="tab active" data-tab="episode">Episode</button>
        <button class="tab" data-tab="date">Date</button>
      </div>

      <!-- Episode filter -->
      <div id="tab-episode" class="tab-panel">
        <p class="hint">Show comments posted before the <em>next</em> episode aired.</p>
        <div class="field">
          <label for="show-name">Show Name</label>
          <input type="text" id="show-name" placeholder="e.g. Breaking Bad" autocomplete="off" />
          <div id="show-suggestions" class="suggestions hidden"></div>
        </div>
        <div class="field-row">
          <div class="field">
            <label for="season">Season</label>
            <input type="number" id="season" min="1" placeholder="2" />
          </div>
          <div class="field">
            <label for="episode">Episode</label>
            <input type="number" id="episode" min="1" placeholder="5" />
          </div>
        </div>
        <div id="episode-result" class="episode-result hidden"></div>
      </div>

      <!-- Date filter -->
      <div id="tab-date" class="tab-panel hidden">
        <p class="hint">Hide comments posted on or after this date.</p>
        <div class="field">
          <label for="cutoff-date">Cutoff Date</label>
          <input type="date" id="cutoff-date" />
        </div>
      </div>

      <button id="load-btn" class="btn-primary">Load Thread</button>
    </section>

    <!-- Status / error -->
    <div id="status" class="status hidden"></div>

    <!-- Thread display -->
    <section id="thread-section" class="hidden">
      <div id="post-header" class="card post-header"></div>
      <div id="filter-bar" class="filter-bar"></div>
      <div id="comments-container"></div>
      <div id="load-more" class="hidden"></div>
    </section>
  </main>

  <footer>
    <p>Plot Armor — spoiler-safe episode discussions</p>
  </footer>

  <script src="app.js"></script>
</body>
</html>
